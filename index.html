<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <!-- WeChat sharing card -->
  <meta property="og:title" content="GeoGebra 数学工具" />
  <meta property="og:description" content="在线数学计算器 — 函数图像、几何作图、三维图形" />

  <title>GeoGebra 数学工具</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>
<body>

  <nav id="tab-bar">
    <button class="tab active" data-app="graphing">函数图像</button>
    <button class="tab" data-app="geometry">几何</button>
    <button class="tab" data-app="3d">三维</button>
    <button class="tab" data-app="classic">经典</button>
  </nav>

  <div id="ggb-container">
    <div id="ggb-element"></div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>加载中，请稍候…</p>
    </div>
    <button id="save-btn" title="保存图像">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
    </button>
  </div>

  <div id="image-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <img id="modal-img" src="" alt="GeoGebra 图像" />
      <p class="modal-tip">📱 手机：长按图片保存到相册<br>💻 电脑：点击「下载」按钮</p>
      <div class="modal-actions">
        <a id="download-link" download="geogebra.png" class="btn-download">下载</a>
        <button id="modal-close" class="btn-close">关闭</button>
      </div>
    </div>
  </div>

  <footer id="attribution">
    Made with <a href="https://www.geogebra.org" target="_blank">GeoGebra®</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
